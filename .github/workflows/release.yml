name: release

# Fires when `bun release` publishes a GitHub Release. Builds, signs (Developer
# ID), notarizes, and attaches Cafein.dmg — using credentials stored as repo
# Secrets, so the signing key never leaves GitHub and nobody needs Apple
# credentials on their own machine to cut a release.

on:
  release:
    types: [published]

permissions:
  contents: write # to upload the DMG asset to the release

jobs:
  sign-and-attach:
    runs-on: macos-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build, sign & notarize DMG
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_API_KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
        run: |
          set -euo pipefail
          ARCHIVE="$RUNNER_TEMP/Cafein.xcarchive"
          EXPORT="$RUNNER_TEMP/export"

          xcodebuild -project cafein.xcodeproj -scheme cafein -configuration Release \
            -destination 'generic/platform=macOS' -archivePath "$ARCHIVE" archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID"

          printf '<?xml version="1.0" encoding="UTF-8"?>\n<plist version="1.0"><dict><key>method</key><string>developer-id</string><key>teamID</key><string>%s</string><key>signingStyle</key><string>manual</string></dict></plist>\n' "$TEAM_ID" > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive -archivePath "$ARCHIVE" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" -exportPath "$EXPORT"

          STAGE="$RUNNER_TEMP/dmg"
          mkdir -p "$STAGE"
          cp -R "$EXPORT/cafein.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname Cafein -srcfolder "$STAGE" -ov -format UDZO "$RUNNER_TEMP/Cafein.dmg"

          echo "$NOTARY_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool submit "$RUNNER_TEMP/Cafein.dmg" \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait
          rm "$RUNNER_TEMP/AuthKey.p8"
          xcrun stapler staple "$RUNNER_TEMP/Cafein.dmg"

      - name: Attach DMG to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$RUNNER_TEMP/Cafein.dmg" --clobber

      - name: Sign update & publish appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SIGN=$(find ~/Library/Developer/Xcode/DerivedData -name sign_update -path '*artifacts/sparkle*' | head -1)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          SIG_ATTRS=$("$SIGN" --ed-key-file "$RUNNER_TEMP/sparkle_key" "$RUNNER_TEMP/Cafein.dmg")
          rm -f "$RUNNER_TEMP/sparkle_key"
          SHORT="${TAG#v}"
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$RUNNER_TEMP/export/cafein.app/Contents/Info.plist")
          URL="https://github.com/$REPO/releases/download/$TAG/Cafein.dmg"
          NOTES="https://github.com/$REPO/releases/tag/$TAG"
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          printf '<?xml version="1.0" encoding="utf-8"?>\n<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">\n  <channel>\n    <title>Cafein</title>\n    <item>\n      <title>%s</title>\n      <pubDate>%s</pubDate>\n      <sparkle:version>%s</sparkle:version>\n      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n      <sparkle:releaseNotesLink>%s</sparkle:releaseNotesLink>\n      <enclosure url="%s" type="application/octet-stream" %s />\n    </item>\n  </channel>\n</rss>\n' "$SHORT" "$PUBDATE" "$BUILD" "$SHORT" "$NOTES" "$URL" "$SIG_ATTRS" > appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for $TAG" || echo "appcast unchanged"
          git push origin main
